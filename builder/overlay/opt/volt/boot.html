<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SAMARIS OS</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #000;
      --fg: #f7f7f2;
      --muted: #9da3ad;
      --accent: #48f0c8;
      --accent-2: #f5cf62;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 46%, rgba(72, 240, 200, 0.12), transparent 22rem),
        linear-gradient(180deg, #050505 0%, var(--bg) 58%);
      color: var(--fg);
      display: grid;
      place-items: center;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(92vw, 42rem);
      min-height: 24rem;
      display: grid;
      place-items: center;
      text-align: center;
    }

    .mark {
      position: relative;
      width: 8rem;
      height: 8rem;
      margin: 0 auto 2.5rem;
      display: grid;
      place-items: center;
    }

    .mark::before,
    .mark::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid rgba(247, 247, 242, 0.14);
    }

    .mark::before {
      border-top-color: var(--accent);
      border-right-color: rgba(72, 240, 200, 0.42);
      animation: spin 2.8s linear infinite;
      box-shadow: 0 0 36px rgba(72, 240, 200, 0.16);
    }

    .mark::after {
      inset: 1.1rem;
      border-bottom-color: var(--accent-2);
      animation: spin 4.6s linear infinite reverse;
    }

    .core {
      width: 0.72rem;
      height: 0.72rem;
      border-radius: 50%;
      background: var(--fg);
      box-shadow:
        0 0 18px rgba(255, 255, 255, 0.7),
        0 0 46px rgba(72, 240, 200, 0.34);
    }

    h1 {
      margin: 0;
      font-size: clamp(3.4rem, 11vw, 7.8rem);
      line-height: 0.92;
      letter-spacing: 0;
      font-weight: 800;
    }

    p {
      margin: 1.2rem 0 0;
      color: var(--muted);
      font-size: clamp(1rem, 2.3vw, 1.35rem);
      letter-spacing: 0;
    }

    .scanline {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0.025),
        rgba(255, 255, 255, 0.025) 1px,
        transparent 1px,
        transparent 5px
      );
      opacity: 0.22;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <main aria-label="SAMARIS OS boot splash">
    <section>
      <div class="mark" aria-hidden="true">
        <div class="core"></div>
      </div>
      <h1>SAMARIS OS</h1>
      <p>Booting interface...</p>
    </section>
  </main>
  <div class="scanline" aria-hidden="true"></div>
</body>
</html>
