<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Samaris OS</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #000;
      --fg: rgba(255, 255, 255, 0.92);
      --muted: rgba(255, 255, 255, 0.62);
      --accent: #48f0c8;
    }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      overflow: hidden;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #boot {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 46%, rgba(72, 240, 200, 0.12), transparent 22rem),
        linear-gradient(180deg, #050505 0%, #000 58%);
      color: var(--fg);
      transition: opacity 520ms ease;
      opacity: 1;
      z-index: 10;
    }

    #boot.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .wrap { text-align: center; }

    .mark {
      position: relative;
      width: 92px;
      height: 92px;
      margin: 0 auto 22px;
      display: grid;
      place-items: center;
    }

    .mark::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-top-color: var(--accent);
      animation: spin 1.2s linear infinite;
      box-shadow: 0 0 30px rgba(72, 240, 200, 0.16);
    }

    .core {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 0 22px rgba(255, 255, 255, 0.55), 0 0 46px rgba(72, 240, 200, 0.28);
    }

    h1 {
      margin: 0;
      font-weight: 800;
      letter-spacing: 0;
      font-size: 56px;
      line-height: 1;
    }

    p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 16px;
    }

    #app {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      opacity: 0;
      transition: opacity 520ms ease;
      background: #000;
    }

    #app.ready { opacity: 1; }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="boot" aria-label="Samaris OS boot">
    <div class="wrap">
      <div class="mark" aria-hidden="true"><div class="core"></div></div>
      <h1>Samaris OS 1.0 Mountain Lake Alpha One</h1>
      <p>Loading desktop...</p>
    </div>
  </div>

  <iframe id="app" title="Samaris Desktop" src="app/index.html"></iframe>

  <script>
    // Loader contract:
    // - The React app runs in the iframe (app/index.html)
    // - When the app is ready to display, it posts:
    //   window.parent.postMessage({ type: "volt:ready" }, "*")
    // - We fade out the boot screen only after that signal.

    const boot = document.getElementById("boot");
    const app = document.getElementById("app");

    let ready = false;
    function fadeToApp() {
      if (ready) return;
      ready = true;
      app.classList.add("ready");
      boot.classList.add("hidden");
      setTimeout(() => boot.remove(), 900);
    }

    window.addEventListener("message", (ev) => {
      const data = ev && ev.data;
      if (data && data.type === "volt:ready") fadeToApp();
    });

    // Safety: if the app errors and never signals ready, we keep the boot screen.
  </script>
</body>
</html>
