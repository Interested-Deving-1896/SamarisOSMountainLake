# Tesseract Engine — Kernel B Configuration
socket_path = "/run/samaris/volt-kernel-b.sock"
websocket_port = 9998
debug_mode = false
max_workers = 8
thermal_throttle_celsius = 85.0
thermal_emergency_celsius = 95.0
thermal_critical_celsius = 100.0
metrics_interval_ms = 1000
watchdog_interval_ms = 2000
scheduler_tick_ms = 16
max_total_memory_mb = 1024
max_open_sockets = 64
max_concurrent_tasks = 16
audit_max_entries = 10000
quota_default_max_memory_mb = 256
quota_default_max_tasks = 4
quota_default_max_commands_per_sec = 100

# Orbit LLM reservation — ensures inference tasks get dedicated resources
[orbit_reservation]
workers = 4
memory_mb = 512
priority = "critical"
burst_window_ms = 100
