# SAMARIS ISO GENERATOR — Configuration
# Sauvegardee le 2026-05-18 15:30:00
# Build: Mountain Lake Alpha One

[project]
name = "Samaris OS 1.0 Mountain Lake Alpha One"
debian_suite = "trixie"
debian_mirror = "https://deb.debian.org/debian"
live_user = "user"

[architectures]
x86_64 = true
aarch64 = true

[ai]
orbit_llm = true
whisper_stt = true
outetts = true
wav_tokenizer = true
post_install = false

[volt_daemons]
kernel_b = true
vrm = true
vgm = true
vum = true
dwp = true
asc = true
bench = false

[services]
network_manager = true
cups = true
power = true

[desktop]
volt_desktop_ui = true
browser_chromium = true
demo_module = true

[build]
mode = "full"        # full | resume | from | single
from_step = ""
single_step = ""
use_docker = true
force_rebuild = false
dry_run = false
